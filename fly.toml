# fly.toml — backend Queneau (backend-divine-harbor-8895)
# Ver https://fly.io/docs/reference/configuration/

app = 'backend-divine-harbor-8895'
primary_region = 'lax'

[build]

[env]
  PORT = "4000"
  COVERS_DIR = "/data/covers"   # portadas en el volumen persistente
  MONGODB_DB = "queneau"

[http_service]
  internal_port = 4000
  force_https = true
  # IMPORTANTE: este backend tiene workers en segundo plano (genera capítulos
  # y portadas). NO debe dormirse, o la generación se cortaría a mitad.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

# Volumen persistente para las portadas (se conserva entre deploys/reinicios)
[mounts]
  source = "queneau_data"
  destination = "/data"
